name: EAS preview Deployment

on:
  push:
    branches: ['uat']

jobs:
  notify_start:
    name: 🚀 Notify deployment start
    type: slack
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        🚀 PROD deployment started
        ```
          Branch: ${{ github.ref_name }}
          App: Kot-Jingrwai
          Platform: android
          channel: preview
          Profile: preview
          Commit: ${{ github.sha }}
        ```

  fingerprint:
    name: 📋 Calculate fingerprint
    type: fingerprint
    environment: preview
    needs: [notify_start]

  notify_fingerprint:
    name: 📤 Fingerprint calculated
    type: slack
    needs: [fingerprint]
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        📋 Fingerprint calculated: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
        Checking for existing build...

  check_existing_build:
    name: 🔍 Check existing build
    type: get-build
    environment: preview
    needs: [fingerprint]
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: preview

  notify_build_check:
    name: 📊 Build check complete
    type: slack
    needs: [check_existing_build, fingerprint]
    if: ${{ always }}
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        🔍 Build check complete
        Build ID: ${{ needs.check_existing_build.outputs.build_id || 'None' }}
        Fingerprint: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}

  build_new:
    name: 🏗️ Create new build
    type: build
    environment: preview
    needs: [check_existing_build, fingerprint]
    if: ${{ !needs.check_existing_build.outputs.build_id }}
    params:
      platform: android
      profile: preview

  notify_build_start:
    name: 🏗️ Build started
    type: slack
    needs: [build_new, check_existing_build]
    if: ${{ !!needs.build_new.outputs.build_id }}
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        🏗️ NEW preview BUILD started
        Build ID: ${{ needs.build_new.outputs.build_id }}
        Profile: preview

  publish_update:
    name: ⚡ Publish OTA update
    type: update
    environment: preview
    needs: [check_existing_build, fingerprint]
    if: ${{ !!needs.check_existing_build.outputs.build_id }}
    params:
      platform: android
      branch: preview
      channel: preview

  notify_update_start:
    name: ⚡ OTA update started
    type: slack
    needs: [publish_update, check_existing_build]
    if: ${{ !!needs.publish_update.outputs.update_group_id || !!needs.check_existing_build.outputs.build_id }}
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        ⚡ OTA UPDATE published
        Using existing build: ${{ needs.check_existing_build.outputs.build_id || 'None' }}
        Channel: preview

  notify_success:
    name: ✅ Deployment successful
    type: slack
    needs: [build_new, publish_update, fingerprint]
    if: ${{ always }}
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        ✅ PROD deployment SUCCESS
        Build ID: ${{ needs.build_new.outputs.build_id || needs.check_existing_build.outputs.build_id || 'N/A' }}
        Fingerprint: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}

  notify_failure:
    name: ❌ Deployment failed
    type: slack
    needs: [fingerprint, check_existing_build, build_new, publish_update]
    if: ${{ failure }}
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        ❌ PROD deployment FAILED
        Build ID: ${{ needs.build_new.outputs.build_id || 'N/A' }}
        Existing Build ID: ${{ needs.check_existing_build.outputs.build_id || 'N/A' }}
        Fingerprint: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
