name: EAS Publish Production OTA Update

on:
  push:
    branches: ["master"]
    paths:
      - "src/apps/mobile/**"
      - "src/packages/**/**"

jobs:
  fingerprint:
    name: 📋 Calculate fingerprint
    type: fingerprint
    environment: production
    working_directory: src/apps/mobile

  publish_ota:
    name: ⚡ Publish OTA Update
    type: update
    environment: production
    working_directory: src/apps/mobile
    needs: [fingerprint]
    params:
      platform: android
      branch: production
      message: "UI/JS changes: ${{ github.event.head_commit.message }}"

  notify_ota:
    name: 📊 OTA Summary
    type: slack
    needs: [publish_ota]
    if: ${{ always() }}
    params:
      webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      message: |
        ⚡ PROD OTA
        Status: ${{ needs.publish_ota.status == 'finished' && '✅ Published' || '❌ Failed' }}
        Fingerprint: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
