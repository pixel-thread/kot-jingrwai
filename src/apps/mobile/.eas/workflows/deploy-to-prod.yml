name: EAS Production Deployment

on:
  push:
    branches: ["master"]
    paths:
      - "src/apps/mobile/**"
      - "src/packages/**/**"

jobs:
  fingerprint:
    name: 📋 Calculate fingerprint
    type: fingerprint
    environment: production
    working_directory: src/apps/mobile

  build_new:
    name: 🏗️ Create new build
    type: build
    environment: production
    working_directory: src/apps/mobile
    needs: [fingerprint]
    params:
      platform: android
      profile: production

  publish_ota:
    name: ⚡ Publish OTA Update
    type: update
    environment: production
    working_directory: src/apps/mobile
    needs: [fingerprint]
    params:
      platform: android
      branch: production
      channel: production
      message: "UI/JS changes: ${{ github.event.head_commit.message }}"

  notify_summary:
    name: 📊 Deployment Summary
    type: slack
    needs: [build_new, publish_ota]
    if: ${{ always() }}
    params:
      webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      message: |
        🚀 PROD Deploy
        OTA: ✅ Always (UI/JS)
        Native Build: ${{ needs.build_new.status == 'finished' && '✅ Created' || '❌ Failed' }}
        Fingerprint: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
