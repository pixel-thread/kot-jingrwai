name: Deploy Prod Web Application to Vercel

on:
  push:
    branches:
      - master
    paths:
      - "src/apps/web/**"
      - "src/packages/**"
      - "!src/packages/ui-native/**"
      - "!src/packages/utils-native/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

# This workflow automates the deployment of the 'web' Next.js application to Vercel.
# It ensures that the build is consistent by using pnpm and targets the specific monorepo app directory.
jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Dependencies
        # Using --frozen-lockfile ensures that the build is deterministic.
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Clients
        # Generates the web database client. 
        run: npx prisma generate --schema=src/apps/web/src/lib/database/prisma/schema.prisma

      - name: Build Workspace
        # Builds the web application using Turbo.
        run: pnpm turbo run build --filter web

      - name: Pull Vercel Environment Information
        # Pulls the environment variables and settings from Vercel.
        working-directory: src/apps/web
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build Project for Vercel
        # Builds the project locally using Vercel's build engine.
        working-directory: src/apps/web
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy Prebuilt Artifacts to Vercel
        # Deploys the artifacts generated in the previous step.
        working-directory: src/apps/web
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
