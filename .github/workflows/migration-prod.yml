name: 🗄️ Migrate Production Database

on:
  push:
    paths:
      - "src/apps/web/src/lib/database/prisma/schema.prisma"
      - "src/apps/web/src/lib/database/prisma/migrations/**"
    branches:
      - master

concurrency:
  group: prisma-migration-prod
  cancel-in-progress: false  # Never cancel a running migration

jobs:
  migrate:
    name: Apply Prisma Migrations
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/apps/web/src/lib/database/prisma/schema.prisma

      - name: Check migration status
        run: npx prisma migrate status --schema=src/apps/web/src/lib/database/prisma/schema.prisma

      - name: Apply pending migrations
        run: npx prisma migrate deploy --schema=src/apps/web/src/lib/database/prisma/schema.prisma
